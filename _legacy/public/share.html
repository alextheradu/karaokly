<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Playlist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f9f9f9;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Search Section */
    .search-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-container input {
      flex: 1;
      padding: 12px 15px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      transition: border-color 0.3s ease;
    }

    .search-container input:focus {
      outline: none;
      border-color: #667eea;
    }

    .search-container button {
      padding: 12px 20px;
      font-size: 16px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .search-container button:hover {
      background: #764ba2;
    }

    /* Grid for search results */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .video-item {
  background: #fff;
  border-radius: 12px;
  /* overflow: hidden; remove this if you don't need to clip corners */
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
  text-align: center;
  margin-bottom: 20px; /* give some vertical spacing instead of clipping */
}

    .video-item:hover {
      transform: translateY(-5px);
    }

    .video-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .video-item p {
      padding: 10px;
      margin: 0;
      font-size: 14px;
      color: #2d3748;
    }

    .video-item button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: none;
      background: #28a745;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .video-item button:hover {
      background: #218838;
    }

    /* Grid for the playlist */
    #playlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .playlist-item {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      padding-bottom: 10px;
    }

    .playlist-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .playlist-item p {
      padding: 10px;
      margin: 0;
      font-size: 14px;
      color: #2d3748;
    }

    .remove-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #e53e3e;
      border: none;
      color: #fff;
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .remove-btn:hover {
      background: #c53030;
    }

    /* Dropdown styles for party member assignment */
    .dropdown {
      position: relative;
      display: inline-block;
      margin-top: 5px;
    }

    .dropdown .dropdown-btn {
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 100;
      min-width: 120px;
    }

    .dropdown-content button {
      background: #667eea;
      color: #fff;
      border: none;
      padding: 8px;
      width: 100%;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }

    .dropdown-content button:hover {
      background: #764ba2;
    }

    .show {
      display: block;
    }

    /* Media query to adjust styles for devices with a max-width of 400px */
    @media (max-width: 400px) {
      .search-container {
        flex-direction: column;
        gap: 8px;
      }

      .search-container input,
      .search-container button {
        padding: 10px 12px;
        font-size: 14px;
      }

      .video-item img {
        height: auto;
      }

      .video-item p,
      .playlist-item p {
        font-size: 12px;
      }

      .video-item button,
      .remove-btn {
        padding: 8px 16px;
        font-size: 14px;
      }

      .dropdown .dropdown-btn,
      .dropdown-content button {
        padding: 6px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add Songs to the Playlist</h1>
    <div class="search-container">
      <input type="text" id="song-input" placeholder="Enter song name..." />
      <button id="search-btn">Search</button>
    </div>
    <div id="results"></div>
    <h2>Current Playlist</h2>
    <div id="playlist"></div>
  </div>
  
  <script>
    // Extract token from URL query params
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (!token) {
      document.body.innerHTML = "<p>Invalid share link.</p>";
    }
    
    // Global variable for share party members
    let sharePartyMembers = [];
    
    // Load shared party members from the server
    function loadSharePartyMembers() {
      fetch(`/share/party-members?token=${token}`)
        .then(response => response.json())
        .then(data => {
          sharePartyMembers = data.partyMembers || [];
          // Reload playlist to update dropdowns with new party members
          loadSharedPlaylist();
        })
        .catch(err => console.error(err));
    }
    
    // Load the shared playlist and display as cards with thumbnails, party member assignment, and remove buttons
    function loadSharedPlaylist() {
      fetch(`/share/playlist?token=${token}`)
        .then(response => response.json())
        .then(data => {
          const playlistEl = document.getElementById('playlist');
          playlistEl.innerHTML = '';
          if (data.playlist && data.playlist.length > 0) {
            data.playlist.forEach(video => {
              const div = document.createElement('div');
              div.className = 'playlist-item';
              // Generate thumbnail URL using the YouTube videoId
              const thumbnail = `https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg`;
              // Build inner HTML with video thumbnail, title, and a dropdown for party member assignment
              div.innerHTML = `
                <img src="${thumbnail}" alt="${video.title}">
                <p>${video.title}</p>
                <div class="dropdown">
                  <button class="dropdown-btn" onclick="toggleShareDropdown(this)">${video.assignedTo ? video.assignedTo : 'Assign'}</button>
                  <div class="dropdown-content">
                    ${sharePartyMembers.map(member => `<button onclick="assignSharePartyMember('${video.videoId}', '${member}', this)">${member}</button>`).join('')}
                    <button onclick="openAddSharePartyMemberPrompt()">+ Add Party Member</button>
                  </div>
                </div>
              `;
              // Create a remove button
              const removeBtn = document.createElement('button');
              removeBtn.className = 'remove-btn';
              removeBtn.textContent = 'Remove';
              removeBtn.addEventListener('click', () => {
                fetch(`/share/playlist/remove?token=${token}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ videoId: video.videoId })
                })
                .then(response => response.json())
                .then(() => loadSharedPlaylist())
                .catch(err => console.error(err));
              });
              div.appendChild(removeBtn);
              playlistEl.appendChild(div);
            });
          } else {
            playlistEl.innerHTML = "<p>No songs yet.</p>";
          }
        })
        .catch(err => console.error(err));
    }
    
    // Search for songs using the YouTube API proxy and display results as cards
    document.getElementById('search-btn').addEventListener('click', () => {
      const query = document.getElementById('song-input').value.trim();
      if (!query) return;
      fetch(`/api/search?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          if (data.items && data.items.length > 0) {
            data.items.forEach(video => {
              const videoId = video.id.videoId;
              const title = video.snippet.title;
              const thumbnail = video.snippet.thumbnails.medium.url;
              const div = document.createElement('div');
              div.className = 'video-item';
              div.innerHTML = `
                <img src="${thumbnail}" alt="${title}">
                <p>${title}</p>
                <button>Add</button>
              `;
              // When "Add" is clicked, add the video to the shared playlist
              div.querySelector('button').addEventListener('click', () => {
                fetch(`/share/playlist/add?token=${token}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ video: { videoId, title } })
                })
                .then(response => response.json())
                .then(() => {
                  loadSharedPlaylist();
                })
                .catch(err => console.error(err));
              });
              resultsDiv.appendChild(div);
            });
          } else {
            resultsDiv.innerHTML = "<p>No results found.</p>";
          }
        })
        .catch(err => console.error(err));
    });
    
    // Dropdown functions for share page
    
    // Toggle display of party member dropdown for share page
    function toggleShareDropdown(btn) {
      const dropdownContent = btn.nextElementSibling;
      dropdownContent.classList.toggle('show');
    }
    
    // Assign a party member to a song on the shared playlist
    function assignSharePartyMember(videoId, member, btn) {
      fetch(`/share/playlist/assign?token=${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoId, assignedTo: member })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // Update the dropdown button text to the selected member
          const dropdownBtn = btn.parentElement.previousElementSibling;
          dropdownBtn.textContent = member;
          btn.parentElement.classList.remove('show');
          loadSharedPlaylist();
        } else {
          alert("Error assigning party member: " + (data.error || "Unknown error"));
        }
      })
      .catch(err => console.error(err));
    }
    
    // Open a prompt to add a new party member (for the share page)
    function openAddSharePartyMemberPrompt() {
      const newMember = prompt("Enter new party member's name:");
      if (newMember && newMember.trim() !== "") {
        fetch(`/share/party-members/add?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ member: newMember.trim() })
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            sharePartyMembers = data.partyMembers;
            loadSharedPlaylist();
          } else {
            alert("Error adding party member: " + (data.error || "Unknown error"));
          }
        })
        .catch(err => console.error(err));
      }
    }
    
    // Poll for shared playlist updates every 5 seconds and load party members on load
    setInterval(loadSharedPlaylist, 5000);
    loadSharedPlaylist();
    loadSharePartyMembers();
  </script>
</body>
</html>
