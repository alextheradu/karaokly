<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaokly Login</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2465555430434322"
     crossorigin="anonymous"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      width: 400px;
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
    }
    button {
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
    }
    #error {
      color: #e53e3e;
      text-align: center;
    }
    .link-container {
      text-align: center;
      margin-top: 10px;
    }
    .link-container a {
      color: #667eea;
      text-decoration: none;
    }
    #forgot-password-container {
      margin-top: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #forgot-password-container input {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
    }
    #forgot-password-container button {
      background: #28a745;
    }
    #forgot-error, #forgot-success {
      text-align: center;
      font-size: 14px;
    }
    #forgot-error {
      color: #e53e3e;
    }
    #forgot-success {
      color: #28a745;
    }
    @media (max-width: 480px) {
      .form-container {
        width: 90%;
        padding: 20px;
      }
    }
    #loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <link rel="icon" href="../karyoke.png" type="image/png">
</head>
<body>
  <div class="form-container">
    <h1>Login</h1>
    <div id="error"></div>
    <form id="login-form">
      <!-- Changed input type to "email" and placeholder to "Email" -->
      <input type="email" id="username" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" id="login-btn">Login</button>
    </form>
    <div class="link-container">
      <a href="/sign-up/">Don't have an account? Sign up</a>
    </div>
    <div class="link-container">
      <a href="#" id="forgot-password-link">Forgot Password?</a>
    </div>
    <div id="forgot-password-container">
      <input type="email" id="forgot-username" placeholder="Enter your email" required>
      <div id="loading-spinner"></div>
      <button type="button" id="forgot-password-btn">Send Reset Email</button>
      <div id="forgot-error"></div>
      <div id="forgot-success"></div>
    </div>
  </div>
  <script>
    // Login logic
    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usernameOrEmail: email, password })
      })
      .then(response => response.json())
      .then(data => {
        if(data.success) {
          window.location.href = "/app";
        } else {
          document.getElementById('error').textContent = data.error || 'Login failed.';
        }
      });
    });

    // Enable form submission on Enter key for login
    document.getElementById('login-form').addEventListener('keydown', e => {
      if(e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('login-btn').click();
      }
    });

    // Toggle forgot password form display
    const forgotLink = document.getElementById('forgot-password-link');
    const forgotContainer = document.getElementById('forgot-password-container');
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotContainer.style.display = forgotContainer.style.display === 'flex' ? 'none' : 'flex';
    });

    // Forgot password submission logic with loading spinner
    document.getElementById('forgot-password-btn').addEventListener('click', () => {
      const forgotEmail = document.getElementById('forgot-username').value.trim();
      const spinner = document.getElementById('loading-spinner');
      document.getElementById('forgot-error').textContent = '';
      document.getElementById('forgot-success').textContent = '';
      if (!forgotEmail) {
        document.getElementById('forgot-error').textContent = 'Please enter your email.';
        return;
      }
      spinner.style.display = 'block';
      fetch('/request-password-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: forgotEmail })
      })
      .then(response => response.json())
      .then(data => {
        spinner.style.display = 'none';
        if(data.success) {
          document.getElementById('forgot-success').textContent = data.message || 'If that user exists, a reset email has been sent.';
        } else {
          document.getElementById('forgot-error').textContent = data.error || 'Error sending reset email.';
        }
      })
      .catch(err => {
        spinner.style.display = 'none';
        document.getElementById('forgot-error').textContent = 'An error occurred.';
      });
    });
  </script>
</body>
</html>
